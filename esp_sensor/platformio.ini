; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32vn-iot-uno]
platform = espressif32
board = esp32vn-iot-uno
framework = espidf
monitor_speed = 115200

; ESP-IDF components (esp-idf-lib/dht, etc.) are declared in src/idf_component.yml
; and resolved via the ESP Component Registry - do NOT add them to lib_deps

build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    ; WiFi & server config - override these for production
    -DCONFIG_WIFI_SSID=\"Star\"
    -DCONFIG_WIFI_PASSWORD=\"internet1\"
    -DCONFIG_SERVER_HOST=\"192.168.1.141\"
    -DCONFIG_SERVER_PORT=3000
    -DCONFIG_SERVER_PATH=\"/embedded/weather\"
    -DCONFIG_WIFI_CONNECT_TIMEOUT_MS=15000
    -DCONFIG_WIFI_MAX_RETRIES=5
    -DCONFIG_HTTP_TIMEOUT_MS=10000
